<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PSYCHEDELIC CHAOS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #000; overscroll-behavior: none;
    font-family: ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; color: #fff; user-select: none; cursor: crosshair; }
  canvas { position: absolute; inset: 0; }

  /* scanlines */
  body::after { content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 40;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay; }

  @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.4} 94%{opacity:1} 97%{opacity:.7} }
  .flicker { animation: flicker 4s infinite; }

  /* meter panel */
  .panel { position: absolute; bottom: 16px; left: 16px; z-index: 30; width: 210px; padding: 12px;
    border-radius: 6px; border: 1px solid rgba(0,240,255,.3); background: rgba(0,0,0,.5);
    backdrop-filter: blur(4px); box-shadow: 0 0 20px rgba(0,240,255,.15); }
  .panel__top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .panel__title { font-size: 10px; letter-spacing: .3em; color: #00f0ff; }
  .state { font-size: 10px; letter-spacing: .15em; color: #ff00d4; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 6px; font-size: 14px; }
  .row:last-child { margin-bottom: 0; }
  .lbl { font-size: 10px; letter-spacing: .2em; opacity: .6; }
  .val { font-variant-numeric: tabular-nums; }
  .unit { font-size: 9px; opacity: .5; margin-left: 4px; }

  .tag { position: absolute; top: 16px; right: 16px; z-index: 30; text-align: right; }
  .tag__1 { font-size: 10px; letter-spacing: .3em; color: rgba(255,0,212,.8); }
  .tag__2 { font-size: 9px; letter-spacing: .2em; color: rgba(255,255,255,.3); }

  /* start overlay */
  .overlay { position: absolute; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(0,0,0,.8); backdrop-filter: blur(4px); }
  .start { padding: 20px 40px; font-size: 18px; letter-spacing: .35em; font-weight: 700; color: #00f0ff;
    border: 1px solid rgba(0,240,255,.6); border-radius: 6px; background: transparent; cursor: pointer;
    box-shadow: 0 0 30px rgba(0,240,255,.4), inset 0 0 20px rgba(0,240,255,.1); transition: all .3s; }
  .start:hover { color: #000; background: #00f0ff; box-shadow: 0 0 40px rgba(255,0,212,.6); }
  .note { margin-top: 24px; font-size: 11px; letter-spacing: .25em; color: rgba(255,255,255,.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="panel">
  <div class="panel__top">
    <span class="panel__title flicker">// SYS.MONITOR</span>
    <span class="state" id="mState">MUTED</span>
  </div>
  <div class="row"><span class="lbl">FREQ</span><span class="val" style="color:#00f0ff;text-shadow:0 0 8px #00f0ff"><span id="mFreq">0</span><span class="unit">Hz</span></span></div>
  <div class="row"><span class="lbl">CUTOFF</span><span class="val" style="color:#aaff00;text-shadow:0 0 8px #aaff00"><span id="mCutoff">0</span><span class="unit">Hz</span></span></div>
  <div class="row"><span class="lbl">CHAOS</span><span class="val" style="color:#ff00d4;text-shadow:0 0 8px #ff00d4"><span id="mChaos">0</span><span class="unit">%</span></span></div>
  <div class="row"><span class="lbl">DRIVE</span><span class="val" style="color:#ff7a00;text-shadow:0 0 8px #ff7a00"><span id="mDrive">0</span><span class="unit">%</span></span></div>
  <div class="row"><span class="lbl">FEEDBK</span><span class="val" style="color:#9d00ff;text-shadow:0 0 8px #9d00ff"><span id="mFb">0</span><span class="unit">%</span></span></div>
</div>

<div class="tag">
  <div class="tag__1">PSYCHEDELIC_CHAOS</div>
  <div class="tag__2">v1.0 / MOVE TO DISTORT</div>
</div>

<div class="overlay" id="overlay">
  <button class="start" id="startBtn"><span class="flicker">START CHAOS</span></button>
  <p class="note">音量注意 / マウスを動かすほど凶悪になります</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx2d = canvas.getContext('2d');
const mouse = { x: 0.5, y: 0.5, px: 0.5, py: 0.5, speed: 0, t: 0 };
let audio = null;
const curveCache = {};

// ---- meter refs ----
const mFreq = document.getElementById('mFreq');
const mCutoff = document.getElementById('mCutoff');
const mChaos = document.getElementById('mChaos');
const mDrive = document.getElementById('mDrive');
const mFb = document.getElementById('mFb');
const mState = document.getElementById('mState');

// ---- distortion curve (quantized + cached) ----
function makeCurve(amount) {
  const q = Math.round(amount * 20);
  if (curveCache[q]) return curveCache[q];
  const k = q * 6, n = 2048, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((3 + k) * x * 20 * Math.PI) / 180 / (Math.PI + k * Math.abs(x));
  }
  curveCache[q] = curve;
  return curve;
}

// ---- audio graph ----
function startAudio() {
  const Ctx = window.AudioContext || window.webkitAudioContext;
  const ctx = new Ctx();

  const comp = ctx.createDynamicsCompressor();
  comp.threshold.value = -12; comp.knee.value = 12; comp.ratio.value = 14;
  comp.attack.value = 0.003; comp.release.value = 0.25;
  comp.connect(ctx.destination);

  const master = ctx.createGain(); master.gain.value = 0; master.connect(comp);
  const analyser = ctx.createAnalyser(); analyser.fftSize = 2048; master.connect(analyser);

  const filter = ctx.createBiquadFilter(); filter.type = "lowpass"; filter.frequency.value = 800; filter.Q.value = 7;
  const shaper = ctx.createWaveShaper(); shaper.curve = makeCurve(0); shaper.oversample = "4x";
  const delay = ctx.createDelay(1.0); delay.delayTime.value = 0.23;
  const feedback = ctx.createGain(); feedback.gain.value = 0.3;
  delay.connect(feedback); feedback.connect(delay);

  const mix = ctx.createGain(); mix.gain.value = 0.28;
  mix.connect(filter); filter.connect(shaper);
  shaper.connect(master); shaper.connect(delay); delay.connect(master);

  const voices = [
    { type: "sawtooth", mult: 0.5, detune: 0, gain: 0.55 },
    { type: "square",   mult: 1.0, detune: -8, gain: 0.38 },
    { type: "sawtooth", mult: 1.0, detune: 11, gain: 0.42 },
    { type: "sawtooth", mult: 1.5, detune: 4, gain: 0.30 },
  ];
  const oscs = voices.map((v) => {
    const o = ctx.createOscillator(); o.type = v.type;
    o.frequency.value = 110 * v.mult; o.detune.value = v.detune;
    const g = ctx.createGain(); g.gain.value = v.gain;
    o.connect(g); g.connect(mix); o.start();
    return { o, mult: v.mult };
  });

  const nLen = ctx.sampleRate * 2;
  const nBuf = ctx.createBuffer(1, nLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
  const noiseGain = ctx.createGain(); noiseGain.gain.value = 0;
  noise.connect(noiseGain); noiseGain.connect(filter); noise.start();

  master.gain.setTargetAtTime(0.32, ctx.currentTime, 0.6);
  audio = { ctx, master, analyser, filter, shaper, delay, feedback, mix, oscs, noiseGain, lastCurveQ: -1 };
}

document.getElementById('startBtn').addEventListener('click', () => {
  if (!audio) startAudio();
  document.getElementById('overlay').style.display = 'none';
});

// ---- pointer tracking ----
function onMove(e) {
  const p = e.touches ? e.touches[0] : e;
  const x = p.clientX / window.innerWidth;
  const y = p.clientY / window.innerHeight;
  const now = performance.now();
  const dt = Math.max(now - mouse.t, 1);
  const dist = Math.hypot(x - mouse.x, y - mouse.y);
  const inst = Math.min((dist / dt) * 1000, 6);
  mouse.speed = mouse.speed * 0.8 + inst * 0.2;
  mouse.px = mouse.x; mouse.py = mouse.y;
  mouse.x = x; mouse.y = y; mouse.t = now;
}
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, { passive: true });

// ---- canvas + loop ----
let W, H, dpr;
function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W + "px"; canvas.style.height = H + "px";
  ctx2d.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

const wave = new Uint8Array(2048);
let frame = 0;

function loop() {
  frame++;
  mouse.speed *= 0.93;
  const chaos = Math.min(mouse.speed * 0.55, 1);
  const t = performance.now() * 0.001;

  const baseFreq = 55 * Math.pow(2, mouse.x * 5);
  const cutoff = 120 * Math.pow(2, (1 - mouse.y) * 6);

  if (audio) {
    const A = audio, ct = A.ctx.currentTime;
    A.oscs.forEach((v) => v.o.frequency.setTargetAtTime(baseFreq * v.mult, ct, 0.02));
    A.filter.frequency.setTargetAtTime(cutoff, ct, 0.02);
    A.filter.Q.setTargetAtTime(6 + chaos * 14, ct, 0.05);
    A.feedback.gain.setTargetAtTime(0.2 + chaos * 0.65, ct, 0.05);
    A.noiseGain.gain.setTargetAtTime(chaos * 0.35, ct, 0.05);
    const q = Math.round(chaos * 20);
    if (q !== A.lastCurveQ) { A.shaper.curve = makeCurve(chaos); A.lastCurveQ = q; }
    A.analyser.getByteTimeDomainData(wave);
  } else {
    for (let i = 0; i < wave.length; i++) wave[i] = 128 + Math.sin(i * 0.03 + t * 2) * 40 * Math.sin(t * 0.7);
  }

  // afterimage feedback
  ctx2d.globalCompositeOperation = "source-over";
  ctx2d.fillStyle = `rgba(3, 0, 8, ${0.2 - chaos * 0.15})`;
  ctx2d.fillRect(0, 0, W, H);

  const shake = chaos * 14;
  ctx2d.save();
  if (shake > 0.5) ctx2d.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
  ctx2d.globalCompositeOperation = "lighter";
  const hueBase = (t * 30 + mouse.x * 360) % 360;

  let amp = 0;
  for (let i = 0; i < wave.length; i += 16) amp += Math.abs(wave[i] - 128);
  amp = amp / (wave.length / 16) / 128;
  const cx = W / 2, cy = H / 2;
  const sides = 3 + Math.floor(mouse.x * 6);
  const baseR = 80 + amp * 260 + chaos * 120;
  for (let ring = 0; ring < 3; ring++) {
    const r = baseR * (1 - ring * 0.28);
    const rot = t * (0.4 + chaos) + ring * 0.5;
    ctx2d.beginPath();
    for (let s = 0; s <= sides; s++) {
      const a = rot + (s / sides) * Math.PI * 2;
      const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r;
      s === 0 ? ctx2d.moveTo(px, py) : ctx2d.lineTo(px, py);
    }
    const hue = (hueBase + ring * 60) % 360;
    ctx2d.strokeStyle = `hsl(${hue}, 100%, 60%)`;
    ctx2d.lineWidth = 2; ctx2d.shadowBlur = 18; ctx2d.shadowColor = `hsl(${hue}, 100%, 60%)`;
    ctx2d.stroke();
  }

  const split = chaos * 18;
  const channels = [
    { off: -split, col: `hsla(${hueBase}, 100%, 55%, 0.9)` },
    { off: 0, col: `hsla(${(hueBase + 120) % 360}, 100%, 60%, 0.9)` },
    { off: split, col: `hsla(${(hueBase + 240) % 360}, 100%, 60%, 0.9)` },
  ];
  const mid = H * (0.35 + mouse.y * 0.3);
  channels.forEach((ch) => {
    ctx2d.beginPath();
    for (let i = 0; i < wave.length; i++) {
      const x = (i / wave.length) * W + ch.off;
      const y = mid + (wave[i] - 128) * (1.2 + chaos * 2.5);
      i === 0 ? ctx2d.moveTo(x, y) : ctx2d.lineTo(x, y);
    }
    ctx2d.strokeStyle = ch.col; ctx2d.lineWidth = 2; ctx2d.shadowBlur = 12; ctx2d.shadowColor = ch.col;
    ctx2d.stroke();
  });

  for (let i = 0; i < 3; i++) {
    const r = 20 + i * 30 + amp * 120;
    const hue = (hueBase + 180 + i * 40) % 360;
    ctx2d.beginPath();
    ctx2d.arc(mouse.x * W, mouse.y * H, r, 0, Math.PI * 2);
    ctx2d.strokeStyle = `hsla(${hue}, 100%, 65%, ${0.5 - i * 0.12})`;
    ctx2d.lineWidth = 2; ctx2d.shadowBlur = 20; ctx2d.shadowColor = `hsl(${hue}, 100%, 65%)`;
    ctx2d.stroke();
  }

  ctx2d.restore();
  ctx2d.shadowBlur = 0;

  // slice glitch
  if (chaos > 0.45 && Math.random() < chaos) {
    const slices = 2 + Math.floor(chaos * 5);
    for (let i = 0; i < slices; i++) {
      const sy = Math.random() * H, sh = 6 + Math.random() * 40, off = (Math.random() - 0.5) * 60 * chaos;
      ctx2d.drawImage(canvas, 0, sy * dpr, W * dpr, sh * dpr, off, sy, W, sh);
    }
  }

  if (frame % 4 === 0) {
    mFreq.textContent = String(Math.round(baseFreq)).padStart(5, "0");
    mCutoff.textContent = String(Math.round(cutoff)).padStart(5, "0");
    mChaos.textContent = String(Math.round(chaos * 100)).padStart(3, "0");
    mDrive.textContent = String(Math.round(chaos * 100)).padStart(3, "0");
    mFb.textContent = String(Math.round((0.2 + chaos * 0.65) * 100)).padStart(3, "0");
    mState.textContent = audio ? (chaos > 0.6 ? "OVERDRIVE" : "LIVE") : "MUTED";
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
